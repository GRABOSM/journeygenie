# Build and deploy to GitHub Pages (project URL: https://grabosm.github.io/journeygenie/ ).
# Required for proxy mode: add repository secret REACT_APP_API_PROXY_URL (Worker origin, no trailing slash).
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install and build
        env:
          PUBLIC_URL: /${{ github.event.repository.name }}
          REACT_APP_ENVIRONMENT: production
          REACT_APP_API_PROXY_URL: ${{ secrets.REACT_APP_API_PROXY_URL }}
          REACT_APP_GRAB_MAPS_API_URL: ${{ secrets.REACT_APP_GRAB_MAPS_API_URL }}
          REACT_APP_GRAB_MAPS_API_KEY: ${{ secrets.REACT_APP_GRAB_MAPS_API_KEY }}
          REACT_APP_OPENWEATHER_API_KEY: ${{ secrets.REACT_APP_OPENWEATHER_API_KEY }}
        run: |
          export REACT_APP_GRAB_MAPS_API_URL="${REACT_APP_GRAB_MAPS_API_URL:-https://maps.grab.com}"
          if [ -n "$REACT_APP_API_PROXY_URL" ]; then
            export REACT_APP_GRAB_MAPS_API_KEY=""
            export REACT_APP_OPENWEATHER_API_KEY=""
          fi
          npm ci
          npm run build
          cp build/index.html build/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
